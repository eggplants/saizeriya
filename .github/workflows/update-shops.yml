name: update-shops

on:
  workflow_dispatch:
  schedule:
    # 1st of every month at 03:00 JST (= 18:00 UTC the day before)
    - cron: "0 18 1 * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-shops
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: uv sync --locked
      - run: mise run update-shops
      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- saizeriya/shops.py; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "summary<<EOF"
              git --no-pager diff --stat -- saizeriya/shops.py
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/update-shops
          base: master
          commit-message: "chore: refresh shops.py"
          title: "chore: refresh shops.py"
          body: |
            Auto-generated by `scripts/update_shops.py`.

            ```text
            ${{ steps.diff.outputs.summary }}
            ```
          labels: |
            automated
            shops
          delete-branch: true
